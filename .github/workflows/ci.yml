name: Continuous Integration

on:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: | 
          8.0.*
          9.0.*
          10.0.*
      env:
        DOTNET_NOLOGO: 1
        DOTNET_CLI_TELEMETRY_OPTOUT: 1
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build /p:CollectCoverage=true /p:CoverletOutput='../../' /p:CoverletOutputFormat=opencover /p:Threshold=22 /p:SkipAutoProps=true /p:UseSourceLink=true
    - name: AOT smoke test
      run: |
        dotnet publish test/SequentialGuid.AotSmokeTest -c Release -r win-x64 -o aot-out
        .\aot-out\SequentialGuid.AotSmokeTest.exe
      shell: pwsh
